name: Tourism Monitor

on:
  schedule:
    - cron: "10 6 * * *" # 毎日6:10に実行
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tourism-monitor-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tourism monitor
        id: monitor
        env:
          MONITOR_SOURCES_PATH: config/tourism-sources.json
          MONITOR_STATE_PATH: state/tourism-state.json
          DISCORD_WEBHOOK_URL_TOURISM: ${{ secrets.DISCORD_WEBHOOK_URL_TOURISM }}
        run: npm run monitor:tourism

      - name: Commit state
        if: always() && steps.monitor.outcome != 'skipped'
        uses: ./.github/actions/commit-monitor-state
        with:
          commit-message: Update tourism monitor state
          state-path: state/tourism-state.json
