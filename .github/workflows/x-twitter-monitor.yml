name: X Twitter Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: default-monitor-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # X/Twitter の RSS は Actions runner 内だけで使う RSSHub に委譲する。
      # TWITTER_AUTH_TOKEN は workflow 全体へ広げず、RSSHub と事前チェックだけに渡す。
      rsshub:
        image: ghcr.io/diygod/rsshub@sha256:a2734f3b884b9cf493ccc60a80e2750165862c9ddffc2c6d4520fa6fc21096f3
        ports:
          - 1200:1200
        env:
          CACHE_TYPE: memory
          REQUEST_TIMEOUT: "10000"
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check RSSHub secrets
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
        run: |
          # RSSHub は secret が空でも起動できるため、監視前に明示的に止めて原因をログに残す。
          if [ -z "${TWITTER_AUTH_TOKEN}" ]; then
            echo "TWITTER_AUTH_TOKEN secret is required for X/Twitter RSSHub routes."
            exit 1
          fi

      - name: Wait for RSSHub
        run: |
          # Docker service の起動直後は HTTP を受けられないことがあるため、短く再試行する。
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "http://127.0.0.1:1200/" > /dev/null; then
              echo "RSSHub is ready."
              exit 0
            fi
            echo "Waiting for RSSHub (${attempt}/30)..."
            sleep 2
          done

          echo "RSSHub did not become ready in time."
          exit 1

      - name: Run X/Twitter monitor
        id: monitor
        env:
          MONITOR_SOURCES_PATH: config/default-sources.json
          MONITOR_STATE_PATH: state/default-state.json
          DISCORD_WEBHOOK_URL_MAIN: ${{ secrets.DISCORD_WEBHOOK_URL_MAIN }}
        run: npm run monitor:x-twitter

      - name: Commit state
        if: always() && steps.monitor.outcome != 'skipped'
        uses: ./.github/actions/commit-monitor-state
        with:
          commit-message: Update X Twitter monitor state
          state-path: state/default-state.json
