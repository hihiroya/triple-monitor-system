name: X Profile Monitor

on:
  schedule:
    - cron: "5,35 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: default-monitor-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check X profile monitor secrets
        env:
          DISCORD_WEBHOOK_URL_MAIN: ${{ secrets.DISCORD_WEBHOOK_URL_MAIN }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
        run: |
          missing=0
          for name in DISCORD_WEBHOOK_URL_MAIN TWITTER_AUTH_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Run X profile monitor
        id: monitor
        env:
          MONITOR_SOURCES_PATH: config/default-sources.json
          MONITOR_STATE_PATH: state/default-state.json
          DISCORD_WEBHOOK_URL_MAIN: ${{ secrets.DISCORD_WEBHOOK_URL_MAIN }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
        run: npm run monitor:x-profile

      - name: Commit state
        if: always() && steps.monitor.outcome != 'skipped'
        uses: ./.github/actions/commit-monitor-state
        with:
          commit-message: Update X profile monitor state
          state-path: state/default-state.json
