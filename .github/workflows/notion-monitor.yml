name: Notion Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check Notion monitor secrets
        env:
          DISCORD_WEBHOOK_URL_MAIN: ${{ secrets.DISCORD_WEBHOOK_URL_MAIN }}
          NOTION_TOKEN_MAIN: ${{ secrets.NOTION_TOKEN_MAIN }}
        run: |
          # Notion 監視は secret が空でもアプリ起動後まで進むため、監視前に原因を明示する。
          missing_secrets=()
          if [ -z "${DISCORD_WEBHOOK_URL_MAIN}" ]; then
            missing_secrets+=("DISCORD_WEBHOOK_URL_MAIN")
          fi
          if [ -z "${NOTION_TOKEN_MAIN}" ]; then
            missing_secrets+=("NOTION_TOKEN_MAIN")
          fi

          if [ "${#missing_secrets[@]}" -gt 0 ]; then
            echo "Missing required secrets: ${missing_secrets[*]}"
            exit 1
          fi

      - name: Run Notion monitor
        id: monitor
        env:
          DISCORD_WEBHOOK_URL_MAIN: ${{ secrets.DISCORD_WEBHOOK_URL_MAIN }}
          NOTION_TOKEN_MAIN: ${{ secrets.NOTION_TOKEN_MAIN }}
        run: |
          set +e
          npm run monitor:notion
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit state
        uses: ./.github/actions/commit-monitor-state
        with:
          commit-message: Update Notion monitor state

      - name: Propagate monitor failure
        if: steps.monitor.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.monitor.outputs.exit_code }}
        run: |
          {
            echo "### Notion monitor failed"
            echo
            echo "The Notion monitor command exited with code ${EXIT_CODE}."
            echo "Check the logs in the 'Run Notion monitor' step for the original source failure."
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${EXIT_CODE}" =~ ^[0-9]+$ ]] && [ "${EXIT_CODE}" -ge 0 ] && [ "${EXIT_CODE}" -le 255 ]; then
            exit "${EXIT_CODE}"
          fi

          echo "Invalid monitor exit code: ${EXIT_CODE}"
          exit 1
