name: Notion Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: default-monitor-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check Notion monitor secrets
        env:
          DISCORD_WEBHOOK_URL_MAIN: ${{ secrets.DISCORD_WEBHOOK_URL_MAIN }}
          NOTION_TOKEN_MAIN: ${{ secrets.NOTION_TOKEN_MAIN }}
        run: |
          # Notion 監視は secret が空でもアプリ起動後まで進むため、監視前に原因を明示する。
          missing_secrets=()
          if [ -z "${DISCORD_WEBHOOK_URL_MAIN}" ]; then
            missing_secrets+=("DISCORD_WEBHOOK_URL_MAIN")
          fi
          if [ -z "${NOTION_TOKEN_MAIN}" ]; then
            missing_secrets+=("NOTION_TOKEN_MAIN")
          fi

          if [ "${#missing_secrets[@]}" -gt 0 ]; then
            echo "Missing required secrets: ${missing_secrets[*]}"
            exit 1
          fi

      - name: Run Notion monitor
        id: monitor
        env:
          MONITOR_SOURCES_PATH: config/default-sources.json
          MONITOR_STATE_PATH: state/default-state.json
          DISCORD_WEBHOOK_URL_MAIN: ${{ secrets.DISCORD_WEBHOOK_URL_MAIN }}
          NOTION_TOKEN_MAIN: ${{ secrets.NOTION_TOKEN_MAIN }}
        run: npm run monitor:notion

      - name: Commit state
        if: always() && steps.monitor.outcome != 'skipped'
        uses: ./.github/actions/commit-monitor-state
        with:
          commit-message: Update Notion monitor state
          state-path: state/default-state.json
