name: Notion Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Notion monitor
        id: monitor
        env:
          DISCORD_WEBHOOK_URL_MAIN: ${{ secrets.DISCORD_WEBHOOK_URL_MAIN }}
          NOTION_TOKEN_MAIN: ${{ secrets.NOTION_TOKEN_MAIN }}
        run: |
          set +e
          npm run monitor:notion
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit state
        uses: ./.github/actions/commit-monitor-state
        with:
          commit-message: Update Notion monitor state

      - name: Propagate monitor failure
        if: steps.monitor.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.monitor.outputs.exit_code }}
        run: |
          if [[ "${EXIT_CODE}" =~ ^[0-9]+$ ]] && [ "${EXIT_CODE}" -ge 0 ] && [ "${EXIT_CODE}" -le 255 ]; then
            exit "${EXIT_CODE}"
          fi

          echo "Invalid monitor exit code: ${EXIT_CODE}"
          exit 1
