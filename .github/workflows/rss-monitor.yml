name: RSS Monitor

on:
  schedule:
    - cron: "*/30 * * * *" # 毎時0分と30分に実行
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: default-monitor-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run RSS monitor
        id: monitor
        env:
          MONITOR_SOURCES_PATH: config/default-sources.json
          MONITOR_STATE_PATH: state/default-state.json
          DISCORD_WEBHOOK_URL_MAIN: ${{ secrets.DISCORD_WEBHOOK_URL_MAIN }}
        run: npm run monitor:rss:standard

      - name: Commit state
        if: always() && steps.monitor.outcome != 'skipped'
        uses: ./.github/actions/commit-monitor-state
        with:
          commit-message: Update RSS monitor state
          state-path: state/default-state.json
